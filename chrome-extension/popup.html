<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GovForm AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 340px;
      min-height: 420px;
      background: linear-gradient(135deg, #0a0015 0%, #0d0d2b 100%);
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
    }

    /* Header */
    .header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: rgba(124,58,237,0.12);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-logo {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .header-title { font-weight: 800; font-size: 15px; }
    .header-sub { font-size: 10px; color: #9ca3af; margin-top: 1px; }
    .badge {
      margin-left: auto;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      padding: 3px 8px; border-radius: 20px;
      font-size: 10px; font-weight: 700;
    }

    /* Status bar */
    .status-bar {
      padding: 10px 16px;
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex; align-items: center; gap: 8px;
    }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; }
    .status-dot.active { background: #22c55e; animation: pulse 2s infinite; }
    .status-dot.empty  { background: #f59e0b; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .status-text { font-size: 11px; color: #d1d5db; }

    /* Profile card */
    .profile-card {
      margin: 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      overflow: hidden;
    }
    .profile-header {
      padding: 10px 14px;
      background: rgba(124,58,237,0.15);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      font-weight: 700;
      font-size: 12px;
      color: #c4b5fd;
    }
    .profile-row {
      display: flex;
      padding: 7px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      gap: 8px;
    }
    .profile-row:last-child { border-bottom: none; }
    .profile-label { color: #6b7280; font-size: 11px; width: 100px; flex-shrink: 0; }
    .profile-value { color: #f3f4f6; font-size: 11px; word-break: break-all; }

    /* Empty state */
    .empty-state {
      margin: 20px 16px;
      padding: 20px;
      background: rgba(255,255,255,0.03);
      border: 1px dashed rgba(255,255,255,0.15);
      border-radius: 14px;
      text-align: center;
    }
    .empty-state .icon { font-size: 32px; margin-bottom: 10px; }
    .empty-state h3 { font-size: 14px; margin-bottom: 6px; }
    .empty-state p { color: #6b7280; font-size: 11px; line-height: 1.5; }

    /* Buttons */
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: calc(100% - 24px);
      margin: 6px 12px;
      padding: 11px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      transition: all 0.15s;
    }
    .btn:active { transform: scale(0.98); }

    .btn-primary {
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      color: white;
      box-shadow: 0 4px 20px rgba(124,58,237,0.4);
    }
    .btn-primary:hover { box-shadow: 0 4px 28px rgba(124,58,237,0.6); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-secondary {
      background: rgba(255,255,255,0.06);
      color: #d1d5db;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.1); }

    .btn-danger {
      background: rgba(239,68,68,0.1);
      color: #fca5a5;
      border: 1px solid rgba(239,68,68,0.2);
    }

    /* Fill result */
    .fill-result {
      margin: 0 12px 8px;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 12px;
      display: none;
    }
    .fill-result.success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #86efac; }
    .fill-result.error   { background: rgba(239,68,68,0.1);  border: 1px solid rgba(239,68,68,0.3);  color: #fca5a5; }

    /* Site info */
    .site-info {
      margin: 8px 12px 4px;
      padding: 8px 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      font-size: 11px;
      color: #9ca3af;
    }
    .site-info span { color: #a78bfa; font-weight: 600; }

    /* Steps */
    .steps {
      margin: 8px 12px;
      padding: 12px;
      background: rgba(245,158,11,0.08);
      border: 1px solid rgba(245,158,11,0.2);
      border-radius: 12px;
    }
    .steps-title { color: #fbbf24; font-weight: 700; font-size: 11px; margin-bottom: 8px; }
    .step { display: flex; gap: 8px; margin-bottom: 6px; font-size: 11px; color: #d1d5db; align-items: flex-start; }
    .step-num {
      background: rgba(124,58,237,0.4);
      width: 16px; height: 16px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 800; flex-shrink: 0; margin-top: 1px;
    }

    .footer {
      padding: 10px 16px;
      border-top: 1px solid rgba(255,255,255,0.06);
      text-align: center;
      color: #4b5563;
      font-size: 10px;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header-logo">🇮🇳</div>
    <div>
      <div class="header-title">GovForm <span style="background:linear-gradient(90deg,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">AI</span></div>
      <div class="header-sub">Auto Form Filler for India</div>
    </div>
    <div class="badge">₹50/Form</div>
  </div>

  <!-- Status -->
  <div class="status-bar" id="statusBar">
    <div class="status-dot empty" id="statusDot"></div>
    <span class="status-text" id="statusText">Profile load ho raha hai...</span>
  </div>

  <!-- Main content -->
  <div id="mainContent"></div>

  <div class="footer">⚡ Powered by Claude AI · Made for India 🇮🇳</div>

  <script src="popup.js"></script>
</body>
</html>
